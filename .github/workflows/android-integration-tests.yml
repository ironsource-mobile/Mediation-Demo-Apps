name: Android Integration Tests

on:
  pull_request:
    paths:
      - 'Android/**'
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [Kotlin, Java]

    env:
      PRIVATE_MAVEN_USERNAME: ${{ secrets.PRIVATE_MAVEN_USERNAME }}
      PRIVATE_MAVEN_PASSWORD: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}

    defaults:
      run:
        working-directory: Android/${{ matrix.project }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug and test APKs
        run: ./gradlew assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -noaudio -no-boot-anim
          disable-animations: true
          script: cd Android/${{ matrix.project }} && ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.project }}
          path: |
            Android/${{ matrix.project }}/app/build/reports/androidTests/
            Android/${{ matrix.project }}/app/build/outputs/androidTest-results/
          retention-days: 7
